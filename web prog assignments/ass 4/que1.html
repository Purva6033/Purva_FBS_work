<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists </title>
</head>
<body>

    <h1> Subjects</h1>

    <!-- Ordered List -->
    <h2>Ordered List</h2>

    <ol type="A" start="3">
        <li>Java</li>
        <li>Python</li>
        <li>HTML</li>
        <li>Database Management</li>
    </ol>

    <hr>

    <!-- Unordered List -->
    <h2>Unordered List</h2>

    <ul type="square">
        <li>Reading</li>
        <li>Coding</li>
        <li>Gaming</li>
        <li>Traveling</li>
    </ul>

</body>
</html>
