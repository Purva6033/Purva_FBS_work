<!DOCTYPE html>
<html>
<head>
    <title>HTML Table </title>
</head>
<body>

    <h1>Student Information Table</h1>

    <table border="2" cellspacing="5" cellpadding="10">

        
        <tr>
            <th colspan="4">Student Details</th>
        </tr>

     
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Course</th>
            <th>City</th>
        </tr>

       
        <tr>
            <td>101</td>
            <td>Purva</td>
            <td rowspan="2">Computer Science</td>
            <td>Pune</td>
        </tr>

        
        <tr>
            <td>102</td>
            <td>Rahul</td>
            <td>Mumbai</td>
        </tr>

       
        <tr>
            <td>103</td>
            <td>Anjali</td>
            <td>Information Technology</td>
            <td>Delhi</td>
        </tr>

    </table>

</body>
</html>
